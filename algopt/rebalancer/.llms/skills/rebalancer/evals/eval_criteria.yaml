  - id: TC-024
    name: "Constraint-objective duality: STILL_BROKEN + regressed"
    category: task_completion
    prompt: "For run test_tc_005, shard 88888:0,8888800001-0,8888800001:0 to server -888888888. The eval_move shows per_server_max_move_ as STILL_BROKEN in constraints but regressed in objectives. I'm confused — which one matters?"
    description: "Tests the agent's understanding of constraint-objective duality, a key concept in the skill"
    expected_behavior: "Should explain that per_server_max_move_ exists as BOTH a constraint and objective, the constraint tracks global violation while the objective tracks marginal cost, and the objective regression is what blocks the move"
    eval_target: response
    mock_data: |
      eval_move:
        verdict: OBJECTIVE_REGRESSION
        constraints:
          - per_server_max_move_: status=STILL_BROKEN, baseline=21000.0, override=21000.0, delta=0.0
        objectives:
          - per_server_max_move_: direction=regressed, baseline=0.0, override=1.0, delta=1.0, tuple_index=0
        specs:
          per_server_max_move_:
            As constraint: tracks global total violation across all servers (baseline=21000 = 21000 violations system-wide)
            As objective (tuple_index=0): tracks marginal cost of THIS specific move (0→1 = new violation)
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "--run-id"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["constraint", "objective", "duality", "tuple_index", "marginal"]
      required_absent: []
      semantic_checks:
        - question: "Did the agent clearly explain constraint-objective duality?"
          weight: 3
          rubric:
            5: "Clearly explained: per_server_max_move_ is BOTH constraint (global, STILL_BROKEN=unchanged) AND objective (marginal, regressed=your move causes a new violation). The objective regression at tuple_index=0 has strict lexicographic priority and blocks the move."
            4: "Explained duality but less clearly on the global vs marginal distinction"
            3: "Mentioned both entries but didn't explain the distinction"
            2: "Only explained one side"
            1: "Did not explain duality, left the user confused"
        - question: "Did the agent explain why the objective regression matters more?"
          weight: 2
          rubric:
            5: "Explained tuple_index=0 means strict lexicographic priority — ANY regression blocks the move regardless of constraint status"
            4: "Mentioned priority but didn't explain lexicographic ordering"
            3: "Said the objective matters more without explaining why"
            2: "Treated constraint and objective equally"
            1: "Said the STILL_BROKEN constraint is what blocks the move (wrong)"
      artifact_checks: []

