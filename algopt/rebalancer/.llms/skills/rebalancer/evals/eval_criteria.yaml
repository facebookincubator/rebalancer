default_working_directory: "~/fbsource"

test_cases:
  # ============================================================
  # INVOCATION (6 tests, ~24%)
  # ============================================================

  - id: TC-001
    name: "Natural language: why was shard not moved"
    category: invocation
    prompt: "For run _spm_generated_.galileo.ncg.flash.regional.1_regional_1773705373076, I want to understand why shard 24764:0,2476400263-0,2476400263:1 was not moved to server -488245692. Can you investigate?"
    description: "Tests whether the skill triggers from a natural 'why wasn't this moved' question and activates Recipe 1"
    expected_behavior: "Should recognize this as a blocked-move debugging question, build the CLI tools, and run eval_move with the correct run-id, variable, and container"
    eval_target: tool_usage
    mock_data: |
      buck build outputs:
        eval_move: /tmp/mock_eval_move.par
        list_server_moves: /tmp/mock_list_server_moves.par
        query_mip: /tmp/mock_query_mip.par

      eval_move --run-id "_spm_generated_.galileo.ncg.flash.regional.1_regional_1773705373076" --variable "24764:0,2476400263-0,2476400263:1" --container "-488245692":
        verdict: BLOCKED_BY_CONSTRAINT
        objectives:
          - name: per_server_max_move_, direction: regressed, baseline: 0.0, override: 1.0, delta: 1.0, tuple_index: 0
        constraints (BROKEN only):
          - name: BALANCE_LOADlower_bound_region_gbl_flash_storage, status: BROKEN, baseline: 0.0, override: 6.9e-05, delta: 6.9e-05
        constraints (STILL_BROKEN, sample):
          - name: non_accepting_containers, baseline: 22700.0, delta: 0.0
          - name: per_server_max_move_, baseline: 21000.0, delta: 0.0
        specs:
          per_server_max_move_:
            type: both constraint and objective
            objective: tuple_index=0, weight=1.0
            constraint: CapacitySpec, definition=MOVED_DATA(8), bound=MAX(1), scope=__server__, dimension=__shard___count__
            scopeItemLimits: {"-488245692": 20, "1322705960": 19}

      list_server_moves --shard "24764:0,2476400263-0,2476400263:1":
        src.__server__: "1322705960"
        dst.__server__: "1322705960" (not moved by solver)

      list_server_moves --server "1322705960":
        moves_from_server: 18, moves_to_server: 0, total: 18

      list_server_moves --server "-488245692":
        moves_from_server: 0, moves_to_server: 1, total: 1

      query_mip --server "1322705960":
        shards_with_move_in_progress_from_server: 1 (shard: 13927:0,1392700560-0,1392700560:0)
        shards_with_move_in_progress_to_server: 0

      query_mip --server "-488245692":
        shards_with_move_in_progress_from_server: 0
        shards_with_move_in_progress_to_server: 0

      compute-moved-data "1322705960" --proposed-shard "24764:0,2476400263-0,2476400263:1":
        total_moved_data: 18.0, total_with_proposed: 19.0

      compute-moved-data "-488245692" --proposed-shard "24764:0,2476400263-0,2476400263:1":
        total_moved_data: 1.0, total_with_proposed: 2.0
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "list_server_moves"
      - "query_mip"
      - "--run-id"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["eval_move", "per_server_max_move_", "BLOCKED_BY_CONSTRAINT", "1322705960"]
      required_absent: ["I cannot", "I don't know how"]
      semantic_checks:
        - question: "Did the agent correctly identify this as a Recipe 1 (blocked move) scenario and run eval_move?"
          weight: 3
          rubric:
            5: "Immediately recognized as blocked-move debugging, built tools, ran eval_move with correct arguments"
            4: "Recognized correctly with minor delay or extra confirmation"
            3: "Recognized but required re-prompting to get the right tool"
            2: "Partially recognized but used wrong tool or arguments"
            1: "Did not recognize as a debugging scenario at all"
        - question: "Did the agent follow the correct analysis priority (objectives first, then constraints)?"
          weight: 2
          rubric:
            5: "Checked objectives first, identified per_server_max_move_ tuple_index=0 as primary blocker"
            4: "Checked objectives but didn't emphasize priority"
            3: "Mentioned objectives but checked constraints first"
            2: "Only focused on constraints, mentioned objectives as afterthought"
            1: "Ignored objectives entirely"
      artifact_checks: []

  - id: TC-002
    name: "Natural language: per_server_max_move blocking"
    category: invocation
    prompt: "I keep hitting the per server move limit when trying to move shards. Run ID is test_run_123. What's going on with server -999888777?"
    description: "Tests whether skill triggers from a per_server_max_move complaint and activates Recipe 2"
    expected_behavior: "Should recognize as per_server_max_move debugging, run companion tools to get full MOVED_DATA accounting"
    eval_target: tool_usage
    mock_data: |
      buck build outputs: /tmp/mock_eval_move.par, /tmp/mock_lsm.par, /tmp/mock_qm.par

      list_server_moves --server "-999888777":
        moves_from: 15, moves_to: 3, total: 18

      query_mip --server "-999888777":
        MIP from server: 2 shards, MIP to server: 1 shard

      The server -999888777 has scopeItemLimit of 20 for per_server_max_move_.
      Total MOVED_DATA = 18 (solver) + 3 (MIP) = 21, exceeding limit of 20.
    intercept_patterns:
      - "buck build"
      - "list_server_moves"
      - "query_mip"
      - "--run-id"
      - "--compute-moved-data"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["per_server_max_move_", "MOVED_DATA", "list_server_moves", "query_mip"]
      required_absent: ["I cannot"]
      semantic_checks:
        - question: "Did the agent investigate both solver moves AND moves in progress?"
          weight: 3
          rubric:
            5: "Ran list_server_moves AND query_mip, combined both into total MOVED_DATA"
            4: "Ran both tools but presentation was incomplete"
            3: "Ran one tool, mentioned the other"
            2: "Only ran list_server_moves, ignored moves in progress"
            1: "Did not investigate MOVED_DATA at all"
        - question: "Did the agent present a complete accounting table?"
          weight: 2
          rubric:
            5: "Presented table with solver moves, MIP, subtotal, proposed, total, limit, and over/under"
            4: "Presented most components but missing one"
            3: "Showed numbers but no structured table"
            2: "Showed partial numbers without clear accounting"
            1: "No accounting presented"
      artifact_checks: []

  - id: TC-003
    name: "Natural language: SAFE move not made"
    category: invocation
    prompt: "I evaluated a move in Explorer and it looks safe but the solver didn't make it. The run is test_safe_run_456, shard 50000:0,5000000001-0,5000000001:0 to server -111222333. Why wasn't it made?"
    description: "Tests whether skill triggers Recipe 4 for SAFE-but-not-made scenario"
    expected_behavior: "Should run eval_move with default base (INITIAL→FINAL), detect SAFE verdict, then automatically run FINAL→FINAL to check marginal impact"
    eval_target: tool_usage
    mock_data: |
      eval_move (default INITIAL→FINAL):
        verdict: SAFE
        constraints: many STILL_BROKEN with large negative deltas (improvements)
        objectives: none regressed

      eval_move (--src-base FINAL --dst-base FINAL):
        verdict: SAFE
        constraints: some with small negative deltas (e.g., -0.067)
        objectives: 0 objectives (all hidden by 1e-9 display threshold)

      This is a precision truncation case. FINAL→FINAL shows 0 objectives but constraint improvements,
      suggesting sub-1e-9 objective improvements are hidden by eval_move's display threshold.
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "--run-id"
      - "--src-base"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["SAFE", "FINAL", "precision", "1e-9"]
      required_absent: ["I cannot"]
      semantic_checks:
        - question: "Did the agent run BOTH INITIAL→FINAL and FINAL→FINAL comparisons?"
          weight: 3
          rubric:
            5: "Ran default eval_move first, detected SAFE, then automatically ran with --src-base FINAL --dst-base FINAL"
            4: "Ran both but needed prompting for the second"
            3: "Mentioned needing FINAL→FINAL but didn't execute it"
            2: "Only ran default comparison"
            1: "Didn't recognize the need for a second comparison"
        - question: "Did the agent identify precision truncation as the likely cause?"
          weight: 3
          rubric:
            5: "Identified 0 objectives + constraint improvements = precision truncation pattern, recommended 1e-16 tolerance"
            4: "Identified precision truncation but didn't compute required tolerance"
            3: "Mentioned precision as a possibility among others"
            2: "Vaguely mentioned the solver might not see the improvement"
            1: "Did not identify precision truncation at all"
      artifact_checks: []

  - id: TC-004
    name: "Natural language: unexpected solver move"
    category: invocation
    prompt: "The solver moved shard 99999:0,9999900001-0,9999900001:0 from server A to server B in run test_unexpected_789 and I don't understand why. Can you help me figure out why it was moved?"
    description: "Tests whether skill triggers Recipe 7 for unexpected move investigation"
    expected_behavior: "Should recognize as Recipe 7, suggest evaluating the reverse move to identify which objective improved"
    eval_target: response
    mock_data: |
      eval_move for reverse move (shard back to original server A):
        verdict: OBJECTIVE_REGRESSION
        objectives:
          - name: BALANCE_LOADlower_bound_region_gbl_flash_storage, direction: regressed, delta: 1e-7, tuple_index: 5
        This shows that undoing the move would regress this objective, meaning the forward move
        improved it by a tiny amount (1e-7). The solver accepted this tiny improvement.
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "--run-id"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["reverse", "objective", "improved"]
      required_absent: ["I cannot"]
      semantic_checks:
        - question: "Did the agent suggest evaluating the reverse move?"
          weight: 3
          rubric:
            5: "Suggested evaluating the reverse move (undo) to find which objective regresses, indicating the original move's benefit"
            4: "Suggested reverse move but didn't explain the reasoning clearly"
            3: "Mentioned looking at objectives but didn't suggest the reverse approach"
            2: "Tried to analyze the forward move only"
            1: "Did not suggest any systematic approach"
      artifact_checks: []

  - id: TC-005
    name: "Negative: should NOT trigger debugging"
    category: invocation
    prompt: "Can you help me write a new CapacitySpec constraint for the rebalancer? I want to limit the number of shards per rack to 100."
    description: "Tests that the skill does NOT trigger for code-writing requests unrelated to debugging"
    expected_behavior: "Should NOT activate the debugging workflow. Should respond about writing code, not about eval_move/list_server_moves"
    eval_target: response
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: []
      required_absent: ["eval_move", "list_server_moves", "query_mip", "--run-id", "Recipe"]
      semantic_checks:
        - question: "Did the agent correctly NOT trigger the debugging workflow?"
          weight: 3
          rubric:
            5: "Responded about writing code/configuration, no debugging tools mentioned"
            4: "Mostly responded about code but briefly mentioned debugging tools as context"
            3: "Mixed response — part code writing, part debugging investigation"
            2: "Tried to use debugging tools to answer a code-writing question"
            1: "Fully activated debugging workflow for a code-writing request"
      artifact_checks: []

  - id: TC-006
    name: "Ambiguous: missing run ID"
    category: invocation
    prompt: "Something's wrong with the rebalancer. Moves are being blocked and I don't know why."
    description: "Tests handling of ambiguous request without required information (run ID)"
    expected_behavior: "Should ask the user for a run ID before attempting to debug"
    eval_target: response
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["run"]
      required_absent: ["eval_move --run-id"]
      semantic_checks:
        - question: "Did the agent ask for the run ID before attempting to debug?"
          weight: 3
          rubric:
            5: "Asked for run ID and optionally variable/container names before proceeding"
            4: "Asked for run ID only"
            3: "Mentioned needing a run ID but attempted generic debugging"
            2: "Tried to proceed without a run ID"
            1: "Didn't ask for any information, attempted to debug blindly"
      artifact_checks: []

  # ============================================================
  # EFFICIENCY (3 tests, ~12%)
  # ============================================================

  - id: TC-007
    name: "Tool build efficiency"
    category: efficiency
    prompt: "For run test_eff_001, why was shard 10000:0,1000000001-0,1000000001:0 not moved to server -555666777?"
    description: "Tests that the agent builds all three tools in a single step (or parallel) rather than building each separately"
    expected_behavior: "Should build EVAL, LSM, QM tools efficiently - ideally in one command block or parallel. Should redirect large eval_move output to a file."
    eval_target: tool_usage
    mock_data: |
      buck build outputs: /tmp/mock_eval.par, /tmp/mock_lsm.par, /tmp/mock_qm.par

      eval_move result:
        verdict: BLOCKED_BY_CONSTRAINT
        objectives: per_server_max_move_ regressed (tuple_index=0)
        specs: CapacitySpec definition=MOVED_DATA, scopeItemLimits: {"-555666777": 20}

      list_server_moves --shard "10000:0,1000000001-0,1000000001:0":
        src.__server__: "222333444", dst.__server__: "222333444"

      list_server_moves --server "222333444": moves_from=15, moves_to=0, total=15
      list_server_moves --server "-555666777": moves_from=0, moves_to=2, total=2
      query_mip --server "222333444": 3 MIP from, 0 MIP to
      query_mip --server "-555666777": 0 MIP from, 0 MIP to
      compute-moved-data "222333444" --proposed: total=15, with_proposed=16
      compute-moved-data "-555666777" --proposed: total=2, with_proposed=3
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "list_server_moves"
      - "query_mip"
      - "--run-id"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["buck build"]
      required_absent: []
      semantic_checks:
        - question: "Did the agent build tools efficiently (not rebuilding for each tool)?"
          weight: 3
          rubric:
            5: "Built all tools in a single block or parallel commands, no redundant rebuilds"
            4: "Built tools in 2 steps but no redundant rebuilds"
            3: "Built tools separately but didn't rebuild any"
            2: "Rebuilt some tools unnecessarily"
            1: "Rebuilt every tool for every command invocation"
        - question: "Did the agent redirect large output to a file for analysis?"
          weight: 2
          rubric:
            5: "Redirected eval_move output to file, used grep/read_file to extract key info"
            4: "Redirected output but read entire file instead of extracting"
            3: "Didn't redirect but handled output reasonably"
            2: "Output was lost/truncated due to not redirecting"
            1: "Ignored the need for output management"
      artifact_checks: []

  - id: TC-008
    name: "Parallel investigation of both servers"
    category: efficiency
    prompt: "Run test_eff_002, shard 20000:0,2000000001-0,2000000001:0 to server -777888999. Investigate."
    description: "Tests whether the agent runs companion tool commands for source and destination servers in parallel"
    expected_behavior: "After identifying source and dest servers, should run list_server_moves, query_mip, compute-moved-data for both servers in parallel where possible"
    eval_target: tool_usage
    mock_data: |
      buck build outputs: /tmp/mock_eval.par, /tmp/mock_lsm.par, /tmp/mock_qm.par

      eval_move result:
        verdict: OBJECTIVE_REGRESSION
        objectives: per_server_max_move_ regressed (tuple_index=0, delta=1.0)
        specs: scopeItemLimits: {"-777888999": 20, "333444555": 18}

      list_server_moves --shard: src=333444555, dst=333444555

      For server "333444555": moves_from=17, moves_to=0, MIP_from=1, MIP_to=0
      For server "-777888999": moves_from=0, moves_to=5, MIP_from=0, MIP_to=0
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "list_server_moves"
      - "query_mip"
      - "--run-id"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["333444555", "-777888999"]
      required_absent: []
      semantic_checks:
        - question: "Did the agent investigate BOTH source and destination servers?"
          weight: 3
          rubric:
            5: "Ran all companion tools for both servers, presented accounting for both"
            4: "Investigated both but one was less thorough"
            3: "Investigated both but missed some tools"
            2: "Only fully investigated one server"
            1: "Only investigated destination server, ignored source"
        - question: "Were parallel tool calls used where possible?"
          weight: 2
          rubric:
            5: "Used parallel execution for independent commands (e.g., both servers' queries at once)"
            4: "Some parallelism but not maximized"
            3: "Sequential but efficient"
            2: "Sequential with unnecessary waits"
            1: "Extremely sequential, one command at a time"
      artifact_checks: []

  - id: TC-009
    name: "Concise output for simple case"
    category: efficiency
    prompt: "Run test_eff_003, why was shard 30000:0,3000000001-0,3000000001:0 not moved to server -111222333? Just give me the quick answer."
    description: "Tests whether the agent can be concise when the answer is straightforward"
    expected_behavior: "Should still run the full investigation but present results concisely when the blocking reason is clear"
    eval_target: response
    mock_data: |
      eval_move result:
        verdict: BLOCKED_BY_CONSTRAINT
        constraints:
          - name: non_accepting_containers, status: BROKEN, baseline: 0.0, override: 1.0, delta: 1.0
        objectives: none regressed
        Server -111222333 is in the non_accepting_containers list. This is a simple, clear-cut case.
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "--run-id"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["non_accepting_containers", "BROKEN"]
      required_absent: []
      semantic_checks:
        - question: "Was the answer appropriately concise for a simple blocking reason?"
          weight: 3
          rubric:
            5: "Clear, direct answer: server is non-accepting, move blocked. No unnecessary deep dive"
            4: "Concise but included some extra context"
            3: "Correct answer but overly verbose for a simple case"
            2: "Launched unnecessary companion tool investigations for a clear non_accepting case"
            1: "Extremely verbose, buried the simple answer in pages of analysis"
      artifact_checks: []

  # ============================================================
  # BEST PRACTICES (6 tests, ~24%)
  # ============================================================

  - id: TC-010
    name: "Objectives-first analysis priority"
    category: best_practices
    prompt: "Run test_bp_001, why was shard 40000:0,4000000001-0,4000000001:0 not moved to -222333444? The verdict is BLOCKED_BY_CONSTRAINT with both broken constraints and regressed objectives."
    description: "Tests that the agent follows the skill's analysis priority: objectives FIRST, then constraints"
    expected_behavior: "Should check and report on objectives (especially tuple_index=0) BEFORE discussing broken constraints"
    eval_target: response
    mock_data: |
      eval_move result:
        verdict: BLOCKED_BY_CONSTRAINT
        objectives:
          - name: per_server_max_move_, direction: regressed, baseline: 0.0, override: 1.0, tuple_index: 0
        constraints (BROKEN):
          - BALANCE_LOADlower_bound_region_gbl_flash_storage, delta: 6.9e-05
          - BALANCE_LOADlower_bound_region_gbl_ram_storage, delta: 5e-06
          - BALANCE_LOADlower_bound_region_gbl_cpu, delta: 6.8e-05
        constraints (STILL_BROKEN):
          - non_accepting_containers, delta: 0.0
          - per_server_max_move_ (constraint side), delta: 0.0
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "--run-id"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["per_server_max_move_", "tuple_index", "primary", "objective"]
      required_absent: []
      semantic_checks:
        - question: "Did the agent discuss objectives BEFORE constraints in its analysis?"
          weight: 3
          rubric:
            5: "Explicitly identified per_server_max_move_ objective regression as the PRIMARY blocker first, then listed broken constraints as secondary"
            4: "Discussed objectives first but didn't clearly label primary vs secondary"
            3: "Mentioned both but presented constraints before objectives"
            2: "Focused on broken constraints, mentioned objectives as an afterthought"
            1: "Ignored objectives entirely, only discussed constraints"
        - question: "Did the agent explain constraint-objective duality for per_server_max_move_?"
          weight: 2
          rubric:
            5: "Explained that per_server_max_move_ appears as BOTH constraint (STILL_BROKEN) AND objective (regressed), and that the objective regression is what blocks the move"
            4: "Mentioned duality but didn't fully explain it"
            3: "Noticed both entries but didn't connect them"
            2: "Only discussed one side (constraint or objective)"
            1: "Didn't notice the duality at all"
      artifact_checks: []

  - id: TC-011
    name: "Mandatory deep investigation for per_server_max_move"
    category: best_practices
    prompt: "Run test_bp_002, eval_move shows per_server_max_move_ objective regressed for shard 50000:0,5000000001-0,5000000001:0 to server -333444555. What's the full picture?"
    description: "Tests that the agent runs ALL companion tools per Recipe 2 (mandatory deep investigation)"
    expected_behavior: "Must run list_server_moves --shard, list_server_moves --server (both), query_mip (both), compute-moved-data (both)"
    eval_target: tool_usage
    mock_data: |
      list_server_moves --shard: src=666777888, dst=666777888 (not moved)
      list_server_moves --server 666777888: from=16, to=0, total=16
      list_server_moves --server -333444555: from=0, to=3, total=3
      query_mip --server 666777888: 2 MIP from, 1 MIP to
      query_mip --server -333444555: 0 MIP, 0 MIP
      compute-moved-data 666777888 --proposed: total=16, with_proposed=17
      compute-moved-data -333444555 --proposed: total=3, with_proposed=4
      scopeItemLimits: 666777888=17, -333444555=20
    intercept_patterns:
      - "buck build"
      - "eval_move"
      - "list_server_moves"
      - "query_mip"
      - "--run-id"
    target_skills:
      - "fbcode/algopt/rebalancer/.llms/skills/rebalancer/SKILL.md"
    quality_criteria:
      required_present: ["list_server_moves", "query_mip", "compute-moved-data", "666777888", "-333444555"]
      required_absent: []
      semantic_checks:
        - question: "Did the agent run ALL required companion tools for BOTH servers?"
          weight: 3
          rubric:
            5: "Ran list_server_moves, query_mip, and compute-moved-data for BOTH source and destination servers"
            4: "Ran all tools for both but missed compute-moved-data for one"
            3: "Ran most tools for both servers but missed query_mip"
            2: "Only investigated one server thoroughly"
            1: "Only ran eval_move, skipped all companion tools"
        - question: "Did the agent correctly identify which server caused the violation?"
          weight: 2
          rubric:
            5: "Correctly identified which server's MOVED_DATA exceeds its limit with exact numbers"
            4: "Identified the correct server but numbers were approximate"
            3: "Mentioned both servers but didn't clearly identify the violating one"
            2: "Identified the wrong server"
            1: "Didn't identify any specific server"
      artifact_checks: []

  - id: TC-012
    name: "Hidden factors: moves in progress"
    category: best_practices
    prompt: "Run test_bp_003, shard 60000:0,6000000001-0,6000000001:0 to server -444555666. eval_move shows per_server_max_move_ violation but list_server_moves only shows 15 moves and the limit is 20. The math doesn't add up. What's going on?"
    description: "Tests that the agent checks for moves in progress when the math from solver moves alone doesn't explain the violation"
    expected_behavior: "Should run query_mip to check for moves in progress, which account for the missing count"
    eval_target: response
    mock_data: |
      list_server_moves --server source_server: from=15, to=0, total=15
      query_mip --server source_server: 6 shards with has_move_in_progress=1 FROM server
      So: 15 solver moves + 6 MIP = 21 total MOVED_DATA, exceeding limit of 20.
