name: rebalancer
arch: "${ARCH}"
platform: linux
version: "${VERSION}"
maintainer: "Richard Barnes"
description: "Rebalancer: a library for balanced assignment optimization"
vendor: "Meta Platforms, Inc."
license: "Apache-2.0"
contents:
  - src: _artifacts/linux/
    dst: /usr/local/
    type: tree
  # Register the bundled-deps subdirectory with the system linker so
  # librebalancer.so can find glog, gflags, etc. without rpath patching.
  - src: tools/packages/rebalancer.conf
    dst: /etc/ld.so.conf.d/rebalancer.conf
    type: file

scripts:
  postinstall: tools/packages/postinstall.sh
  postremove: tools/packages/postremove.sh
