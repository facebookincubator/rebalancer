name: sdist

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
    - 'pyproject.toml'
    - 'src/rebalancer/**'
    - 'CMakeLists.txt'
    - 'version.txt'
    - '.github/workflows/sdist.yml'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: sdist-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 1
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Build sdist
      run: pipx run build --sdist
    - uses: actions/upload-artifact@v6
      with:
        name: sdist
        path: dist/*.tar.gz
        if-no-files-found: error
