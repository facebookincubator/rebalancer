name: lint-version

on:
  push:
    branches: [main]
  pull_request:
    paths:
    - 'version.txt'
    - 'tools/lint-version.py'
    - '.github/workflows/lint-version.yml'

concurrency:
  group: lint-version-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v6
      with:
        fetch-depth: 0  # tags needed for monotonic check
    - uses: actions/setup-python@v6
      with:
        python-version: '3.12'
    - name: Install dependencies
      run: pip install packaging
    - name: Lint version.txt
      # --skip-index-check: whether the version is already on PyPI is a
      # release gate, not a lint check. The pre-flight step in publish-testpypi
      # owns that check; running it here causes false failures on PRs that touch
      # this file without bumping the version.
      run: python3 tools/lint-version.py --skip-index-check
